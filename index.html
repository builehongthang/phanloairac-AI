<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Recycling - Green Planet</title>
    <style>
        /* --- BẢNG MÀU PASTEL & CẤU HÌNH --- */
        :root { 
            --organic: #8D6E63; 
            --plastic: #4FC3F7; 
            --paper: #FFD54F;   
            --success: #66BB6A; 
            --danger: #EF5350;
            --main-green: #4CAF50; 
            --hover-green: #388E3C; 
            --bg-color: #E8F5E9;
            --sky-blue: #B3E5FC;
        }

        /* --- CẤU TRÚC HIỂN THỊ CHÍNH (SỬA LỖI LỆCH) --- */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color); /* Nền dự phòng */
        }

        body { 
            display: flex;
            justify-content: center;
            align-items: center;
            background-size: cover;
            /* Đảm bảo chiều cao luôn chiếm toàn bộ màn hình thực tế */
            height: 100vh;
            height: -webkit-fill-available; 
        }

        #game-container { 
    /* Đặt kích thước lấp đầy toàn bộ khung nhìn */
    width: 100vw; 
    height: 100vh;
    
    /* Loại bỏ các giới hạn để tràn màn hình */
    max-width: 100%; 
    max-height: 100%;
    
    /* Loại bỏ bo góc nếu bạn muốn full hoàn toàn không tì vết */
    border-radius: 0; 
    
    /* Các thuộc tính quan trọng khác */
    background: rgba(255, 255, 255, 0.95); 
    box-shadow: none; /* Full màn hình thì không cần đổ bóng bên ngoài */
    position: relative;
    display: flex; 
    flex-direction: column;
    overflow: hidden;
}

        /* --- HIỆU ỨNG THÙNG RÁC --- */
        .bin.correct-flash::after {
            animation: flashSuccess 0.5s ease-out;
            box-shadow: 0 0 40px 15px rgba(255, 255, 255, 0.9);
            filter: brightness(1.3);
        }

        .bin.wrong-shake {
            animation: shakeBin 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes flashSuccess {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes shakeBin {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(3px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }

        /* --- GIAO DIỆN CHÍNH --- */
        * { box-sizing: border-box; font-family: 'Segoe UI', 'Comic Sans MS', cursive, sans-serif; }
        
        /* --- MÀN HÌNH CHỜ & MENU (SỬA CĂN GIỮA NỘI DUNG) --- */
        .screen {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center; /* Đảm bảo nội dung luôn nằm giữa khi màn hình giãn ra */
}
        
        #intro-screen { 
            background-image: url('hinhnenchinh2.jpeg'); 
            background-size: cover;
        }

        #intro-screen button { 
            background: rgba(255,255,255,0.9); 
            padding: 20px; 
            border-radius: 25px; 
            color: #2E7D32; 
            font-size: clamp(1.5rem, 4vw, 2.5rem); 
            border: 4px dashed #A5D6A7;
            margin: 0 0 220px 0;
        }

        #menu { 
            background: #F1F8E9 url('hinhnen4.jpg') no-repeat center center; 
            background-size: cover;
        }

        #menu h1 { 
            font-size: clamp(2.5rem, 8vw, 4.5rem); 
            color: #2E7D32; 
            margin: 0; 
            text-shadow: 4px 4px 0px #FFF;
        }

        .btn-lvl { 
            padding: 15px 40px; 
            margin: 10px; 
            font-size: 1.2rem; 
            cursor: pointer; 
            border: none; 
            border-radius: 30px; 
            background: var(--main-green); 
            color: white; 
            font-weight: bold; 
            box-shadow: 0 6px 0 #388E3C; 
            transition: 0.2s;
        }
        .btn-lvl:active { transform: translateY(4px); box-shadow: 0 2px 0 #388E3C; }

        /* --- MÀN HÌNH CHƠI --- */
        .header { 
            width: 100%; height: 70px; background: #FFF; color: #2E7D32; 
            display: flex; justify-content: space-around; align-items: center; 
            font-weight: 900; font-size: 1.2rem; border-bottom: 4px solid #E8F5E9;
            flex-shrink: 0;
        }

        .bins-container { 
            display: flex; justify-content: space-evenly; width: 100%; padding: 15px 0; 
            background: #F1F8E9; border-bottom: 6px solid #A5D6A7;
            flex-shrink: 0;
        }
        
        .bin { 
            width: 120px; height: 130px; position: relative;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            filter: drop-shadow(0 8px 0px rgba(0,0,0,0.1));
        }
        .bin::after {
            content: ""; position: absolute; bottom: 0; width: 100%; height: 85%;
            border-radius: 10px 10px 25px 25px; z-index: 1;
            clip-path: polygon(5% 0, 95% 0, 100% 100%, 0 100%);
        }
        .bin.organic::after { background: var(--organic); border-top: 8px solid #6D4C41; }
        .bin.plastic::after { background: var(--plastic); border-top: 8px solid #039BE5; }
        .bin.paper::after { background: var(--paper); border-top: 8px solid #FBC02D; }
        
        .bin span { 
            position: relative; z-index: 3; text-align: center; 
            font-size: 14px; font-weight: 900; color: white; padding-bottom: 15px;
        }

        .play-zones { 
            display: flex; width: 100%; flex: 1; 
            background: white url('hinhnen1.jpg') no-repeat center/cover;
            position: relative;
        }

        .zone { flex: 1; position: relative; }
        #player-zone { border-right: 4px dashed #A5D6A7; background: rgba(255,255,255,0.3); }

        .zone-info { 
            padding: 10px; background: rgba(255,255,255,0.9); font-weight: bold; 
            margin: 10px; border-radius: 15px; border: 2px solid #E8F5E9;
            position: relative; z-index: 10;
        }
        
        .item { 
            width: 80px; height: 80px; cursor: grab; position: absolute; 
            font-size: 55px; display: flex; align-items: center; justify-content: center; 
            z-index: 100; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2));
            touch-action: none; /* Quan trọng cho di động */
        }

        /* --- AI LOG --- */
        #ai-log { 
            position: absolute; bottom: 10px; right: 10px; width: 90%;
            background: rgba(55, 71, 79, 0.9); color: #FFF; padding: 10px; 
            font-family: 'Courier New', monospace; font-size: 0.8rem; 
            border-radius: 15px; border-bottom: 4px solid #263238;
            z-index: 5;
        }

        /* --- KẾT QUẢ --- */
        .result-box {
            background: white; padding: 30px; border-radius: 40px; 
            border: 8px solid var(--main-green); box-shadow: 0 20px 0px rgba(0,0,0,0.05);
            width: 90%; max-width: 400px;
        }

        #countdown-overlay { 
            position: absolute; inset: 0; background: rgba(76, 175, 80, 0.95); 
            color: white; display: none; justify-content: center; align-items: center; 
            font-size: 8rem; font-weight: 900; z-index: 2000; text-shadow: 10px 10px 0px rgba(0,0,0,0.1);
        }

        .hidden { display: none !important; }

        #fw-canvas {
            position: fixed; top: 0; left: 0; pointer-events: none; z-index: 3000;
        }
    </style>
</head>
<body>

<div id="leaf-container" style="position: absolute; width: 100%; height: 100%; overflow: hidden; pointer-events: none; z-index: 1;"></div>
<canvas id="fw-canvas"></canvas>

<div id="game-container">
    <div id="countdown-overlay">3</div>

    <div id="intro-screen" class="screen">
        <button class="btn-lvl" style="font-size: 2rem; padding: 15px 40px;" onclick="showMenu()">PHÂN LOẠI RÁC CÙNG AI</button>
        <!-- <button class="btn-lvl" style="font-size: 1.4rem; padding: 15px 40px;" onclick="showMenu()">BẮT ĐẦU NGAY ✨</button> -->
    </div>

    <div id="menu" class="screen hidden">
        <div style="font-size: 80px; margin-bottom: 10px; animation: bounce 2s infinite;">🌱</div> 
        <h1>HÀNH TINH<br><span style="color:#2e7d32;">XANH</span></h1>
        <p style="font-size: 1.1rem; color: #333; margin-bottom: 20px; font-weight: bold;">💎 Hãy chọn thử thách cho mình nhé 💎</p>
        <div>
            <button class="btn-lvl" style="background: #81C784;" onclick="startCountdown('easy')">🎈 DỄ</button>
            <button class="btn-lvl" style="background: #4FC3F7;" onclick="startCountdown('medium')">🚀 VỪA</button>
            <button class="btn-lvl" style="background: #FF8A65;" onclick="startCountdown('hard')">🔥 KHÓ</button>
        </div>
    </div>

    <div id="play-screen" class="screen hidden" style="padding: 0; justify-content: flex-start;">
        <div class="header">
            <div>⏰ <span id="timer">45</span>s</div>
            <div id="level-title" style="background: #E8F5E9; padding: 5px 15px; border-radius: 20px;">---</div>
            <div>🎒 Còn: <span id="items-left">0</span></div>
        </div>
        <div class="bins-container">
            <div class="bin organic" data-type="organic"><span>🍂<br>HỮU CƠ</span></div>
            <div class="bin plastic" data-type="plastic"><span>🥤<br>NHỰA</span></div>
            <div class="bin paper" data-type="paper"><span>📄<br>GIẤY</span></div>
        </div>
        <div class="play-zones">
            <div id="player-zone" class="zone">
                <div class="zone-info">
                    <span>👦 BẠN:</span>
                    <span style="color:var(--main-green)">✅ <span id="p-score">0</span> | ❌ <span id="p-wrong">0</span></span>
                </div>
            </div>
            <div id="ai-zone" class="zone">
                <div class="zone-info">
                    <span>🤖 ROBOT:</span>
                    <span style="color:var(--plastic)">✅ <span id="ai-score">0</span> | ❌ <span id="ai-wrong">0</span></span>
                </div>
                <div id="ai-log">> ĐANG CHỜ...</div>
            </div>
        </div>
    </div>

    <div id="result-screen" class="screen hidden">
        <div class="result-box">
            <div id="result-icon" style="font-size: 70px; margin-bottom: 10px;">🌟</div>
            <h2 id="winner-msg" style="font-size: 2rem; color: #2E7D32; margin-bottom: 15px;">KẾT QUẢ</h2>
            <div id="final-stats" style="font-size: 1.2rem; line-height: 1.6; margin-bottom: 20px; background: #F1F8E9; padding: 15px; border-radius: 20px;"></div>
            <button onclick="location.reload()" class="btn-lvl" style="width:100%; font-size: 1.3rem;">🔄 THỬ LẠI NÈ</button>
        </div>
    </div>
</div>

<script>
    /* TOÀN BỘ LOGIC JAVASCRIPT ĐƯỢC GIỮ NGUYÊN VÀ TỐI ƯU CĂN CHỈNH TỌA ĐỘ */
    function showMenu() {
        document.getElementById('intro-screen').classList.add('hidden');
        document.getElementById('menu').classList.remove('hidden');
    }    

    function createLeaves() {
        const container = document.getElementById('leaf-container');
        const leafEmojis = ['🌸', '🍀', '🍃', '🌼', '🍂'];
        for (let i = 0; i < 15; i++) {
            let leaf = document.createElement('div');
            leaf.style.position = 'absolute';
            leaf.style.top = '-50px';
            leaf.innerText = leafEmojis[Math.floor(Math.random() * leafEmojis.length)];
            leaf.style.left = Math.random() * 100 + 'vw';
            leaf.style.fontSize = (Math.random() * 20 + 20) + 'px';
            leaf.style.animation = `fall ${Math.random() * 5 + 5}s linear infinite`;
            leaf.style.animationDelay = Math.random() * 5 + 's';
            leaf.style.opacity = Math.random();
            container.appendChild(leaf);
        }
    }
    createLeaves();

    const fullKB = [
        {x: 90, y: 10, t: 'organic'},{x: 85, y: 15, t: 'organic'} ,{x: 95, y: 5, t: 'organic'} ,
        {x: 40, y: 45, t: 'plastic'}, {x: 65, y: 35, t: 'organic'},
        {x: 10, y: 30, t: 'plastic'}, {x: 15, y: 35, t: 'plastic'},{x: 5, y: 25, t: 'plastic'} ,
        {x: 50, y: 70, t: 'paper'}, {x: 55, y: 75, t: 'paper'},{x: 45, y: 65, t: 'paper'} 
    ];

    const itemPool = [
        { e: '🍎', x: 92, y: 8,  t: 'organic' }, { e: '🥤', x: 8,  y: 32, t: 'plastic' }, { e: '📦', x: 48, y: 72, t: 'paper' },
        { e: '🍌', x: 85, y: 15, t: 'organic' }, { e: '🥫', x: 15, y: 45, t: 'plastic' }, { e: '📰', x: 55, y: 65, t: 'paper' },
        { e: '🥦', x: 88, y: 12, t: 'organic' }, { e: '🧴', x: 12, y: 38, t: 'plastic' }, { e: '📜', x: 40, y: 80, t: 'paper' }
    ];

    const vnNames = { organic: "HỮU CƠ", plastic: "NHỰA", paper: "GIẤY" };
    const config = { 
        easy:   { total: 10, k: 1, mem: 3,  speed: 1900, think: 1500 }, 
        medium: { total: 15, k: 2, mem: 6,  speed: 1500, think: 1200  }, 
        hard:   { total: 20, k: 3, mem: 11, speed: 1000,  think: 900   } 
    };
    
    let pScore = 0, pWrong = 0, aiScore = 0, aiWrong = 0, pCount = 0, aiCount = 0, gameActive = false, diff = 'easy';

    function triggerBinEffect(type, isCorrect, source) {
        const bin = document.querySelector(`.bin.${type}`);
        if (!bin) return;
        if (isCorrect) {
            bin.classList.add('correct-flash');
            setTimeout(() => bin.classList.remove('correct-flash'), 500);
        } else {
            bin.classList.add('wrong-shake');
            setTimeout(() => bin.classList.remove('wrong-shake'), 400);
        }
    }    

    function startCountdown(d) {
        diff = d;
        document.getElementById('menu').classList.add('hidden');
        const ov = document.getElementById('countdown-overlay');
        ov.style.display = 'flex';
        let c = 3;
        let t = setInterval(() => {
            if(c > 0) ov.innerText = c;
            else if(c === 0) ov.innerText = "SẴN SÀNG!";
            else { clearInterval(t); ov.style.display = 'none'; initGame(); }
            c--;
        }, 800);
    }

    function initGame() {
        document.getElementById('play-screen').classList.remove('hidden');
        let vnDiff = diff === 'easy' ? "Mức DỄ" : (diff === 'medium' ? "Mức VỪA" : "Mức KHÓ");
        document.getElementById('level-title').innerText = vnDiff;
        document.getElementById('items-left').innerText = config[diff].total;
        gameActive = true;
        spawn('player'); spawn('ai');
        let timer = 45;
        let clk = setInterval(() => {
            if(!gameActive) { clearInterval(clk); return; }
            timer--; document.getElementById('timer').innerText = timer;
            if(timer <= 0) endGame();
        }, 1000);
    }

    function spawn(side) {
        if(!gameActive) return;
        const currentCount = side === 'player' ? pCount : aiCount;
        if(currentCount >= config[diff].total) return;
        const data = {...itemPool[Math.floor(Math.random()*itemPool.length)]};
        const div = document.createElement('div');
        div.className = 'item'; div.innerText = data.e;
        const zone = document.getElementById(side + '-zone');
        div.style.top = "40%"; div.style.left = "calc(50% - 40px)";
        zone.appendChild(div);
        if(side === 'player') { pCount++; makeDraggable(div, data); }
        else { aiCount++; runAiKNN(div, data); }
    }

    function runAiKNN(el, data) {
        const s = config[diff];
        const logEl = document.getElementById('ai-log');
        let thinkingInterval = setInterval(() => { logEl.innerText = "> ĐANG SUY NGHĨ..."; }, 250);
        setTimeout(() => {
            clearInterval(thinkingInterval);
            if(!gameActive) return;
            const currentMemory = fullKB.slice(0, s.mem);
            let distances = currentMemory.map(p => ({
                type: p.t, dist: Math.sqrt(Math.pow(data.x - p.x, 2) + Math.pow(data.y - p.y, 2))
            }));
            distances.sort((a, b) => a.dist - b.dist);
            const prediction = distances[0].type;
            logEl.innerText = "> CHỌN: " + vnNames[prediction];
            
            const binEl = document.querySelector(`.bin.${prediction}`);
            const binRect = binEl.getBoundingClientRect();
            const containerRect = document.getElementById('game-container').getBoundingClientRect();
            const itemRect = el.getBoundingClientRect();
            
            document.getElementById('game-container').appendChild(el);
            el.style.left = (itemRect.left - containerRect.left) + "px";
            el.style.top = (itemRect.top - containerRect.top) + "px";
            
            setTimeout(() => {
                if(!gameActive) return;
                el.style.transition = `all ${s.speed/1000}s cubic-bezier(0.4, 0, 0.2, 1)`;
                el.style.left = (binRect.left + binRect.width/2 - containerRect.left - 40) + "px";
                el.style.top = (binRect.top + binRect.height/2 - containerRect.top - 40) + "px";
            }, 50);
            
            setTimeout(() => {
                if(!gameActive) { el.remove(); return; }
                const isCorrect = prediction === data.t;
                if(isCorrect) aiScore++; else aiWrong++;
                triggerBinEffect(prediction, isCorrect, 'ai');
                document.getElementById('ai-score').innerText = aiScore;
                document.getElementById('ai-wrong').innerText = aiWrong;
                el.remove();
                spawn('ai'); checkEnd();
            }, s.speed);
        }, s.think);
    }

    function makeDraggable(el, data) {
        const move = (e) => {
            if(!gameActive) return;
            let x = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            let y = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            const containerRect = document.getElementById('game-container').getBoundingClientRect();
            el.style.left = (x - containerRect.left - el.ox) + "px"; 
            el.style.top = (y - containerRect.top - el.oy) + "px";
        };
        const stop = () => {
            document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', stop);
            document.removeEventListener('touchmove', move); document.removeEventListener('touchend', stop);
            if(!gameActive) { el.remove(); return; }
            const r = el.getBoundingClientRect(); let hitBinType = null;
            document.querySelectorAll('.bin').forEach(b => {
                const br = b.getBoundingClientRect();
                if(r.left < br.right && r.right > br.left && r.top < br.bottom && r.bottom > br.top) hitBinType = b.dataset.type;
            });
            if (hitBinType) {
                const isCorrect = hitBinType === data.t;
                if(isCorrect) pScore++; else pWrong++;
                triggerBinEffect(hitBinType, isCorrect, 'player');
                el.remove(); 
                document.getElementById('p-score').innerText = pScore;
                document.getElementById('p-wrong').innerText = pWrong;
                document.getElementById('items-left').innerText = config[diff].total - pCount;
                spawn('player'); checkEnd();
            } else { el.style.transition = "all 0.4s ease"; el.style.left = "calc(50% - 40px)"; el.style.top = "40%"; }
        };
        const start = (e) => {
            if(!gameActive) return;
            let x = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            let y = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            const rect = el.getBoundingClientRect();
            const containerRect = document.getElementById('game-container').getBoundingClientRect();
            el.ox = x - rect.left; el.oy = y - rect.top;
            document.getElementById('game-container').appendChild(el);
            el.style.left = (rect.left - containerRect.left) + "px"; 
            el.style.top = (rect.top - containerRect.top) + "px";
            el.style.transition = "none";
            document.addEventListener('mousemove', move); document.addEventListener('mouseup', stop);
            document.addEventListener('touchmove', move, {passive: false}); 
            document.addEventListener('touchend', stop);
        };
        el.addEventListener('mousedown', start); 
        el.addEventListener('touchstart', start, {passive: false});
    }

    function checkEnd() { if(pCount >= config[diff].total && aiCount >= config[diff].total && !document.querySelector('.item')) setTimeout(endGame, 800); }
    
    function endGame() {
        gameActive = false; 
        document.querySelectorAll('.item').forEach(item => item.remove());
        document.getElementById('play-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-stats').innerHTML = `👤 <b>EM:</b> Đúng ${pScore} - Sai ${pWrong}<br>🤖 <b>ROBOT:</b> Đúng ${aiScore} - Sai ${aiWrong}`;
        const msg = document.getElementById('winner-msg');
        const icon = document.getElementById('result-icon');
        if(pScore > aiScore) {
            msg.innerText = "🏆 EM GIỎI QUÁ!";
            icon.innerText = "⭐";
            startFireworks();
        } else if (pScore === aiScore) {
            msg.innerText = "🤝 HÒA NHA!";
            icon.innerText = "✨";
        } else {
            msg.innerText = "🤖 CỐ GẮNG LÊN!";
            icon.innerText = "💪";
        }
    }

    const canvas = document.getElementById('fw-canvas'); const ctx = canvas.getContext('2d'); let pts = [];
    function startFireworks() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; loop(); setInterval(() => explode(Math.random()*canvas.width, Math.random()*canvas.height/2), 600); }
    function explode(x,y) { const c = `hsl(${Math.random()*360},100%,50%)`; for(let i=0; i<30; i++) pts.push({x,y,vx:(Math.random()-0.5)*15,vy:(Math.random()-0.5)*15,l:1,c}); }
    function loop() { ctx.clearRect(0,0,canvas.width,canvas.height); pts.forEach((p,i) => { p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.l-=0.02; ctx.fillStyle=p.c; ctx.globalAlpha=p.l; ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fill(); if(p.l<=0) pts.splice(i,1); }); requestAnimationFrame(loop); }
</script>

<style>
    @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
</style>
</body>
</html>
